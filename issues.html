<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    <style>
        .card_container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
    </style>
</head>

<body>
    <div id="navbar" class="bg-white shadow-md">
        <div class="container flex items-center justify-between mx-auto p-4">
            <div class="logo flex items-center">
                <img src="./assets/github-logo_25231 1.png" alt="">
                <span class="ml-2">GitHub Issues Tracker</span>
            </div>
            <div class="search">
                <input type="text" placeholder="Search issues..."
                    class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700">
                    + New Issue
                </button>
            </div>
        </div>
    </div>

    <div id="card">
        <div class="container flex gap-2 mb-4 mx-auto p-4 shadow-md mt-4">
            <button class="rounded-lg px-6 py-2 bg-indigo-600 text-white" onclick="loadData()">All</button>
            <button class="rounded-lg px-6 py-2 border border-[#e4e4e7]">Open</button>
            <button class="rounded-lg px-6 py-2 border border-[#e4e4e7]">Closed</button>
        </div>
    </div>

    <div id="issues">
        <div class="container flex justify-between mb-4 mx-auto p-4 shadow-md mt-4">
            <div class="first flex items-center gap-2">
                <div class="logo">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="content">
                    <h4 class="font-semibold text-lg">50 Issues</h4>
                    <p class="font-normal text-base text-[#64748b]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="issues_light flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    <p class="font-medium text-base">Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                    <p class="font-medium text-base">Closed</p>
                </div>
            </div>
        </div>
    </div>


    <div id="cards">
        <div id="card_container"
            class="container  items-center justify-center  mx-auto p-4 shadow-md mt-4 bg-[#fbfbfb] grid grid-cols-4 grid-rows-1 gap-4">

            <!-- card -->
            
        </div>
    </div>

    <script src="./posts.js"></script>
</body>

</html>
