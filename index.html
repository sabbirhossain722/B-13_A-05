<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Github Issue Tracker</title>
</head>

<body>
    <div id="card" class="mt-4">
        <div class="container mx-auto mt-auto p-6 w-[520px] h-auto bg-white rounded-lg shadow-xl">

            <div class="img flex items-center justify-center">
                <img src="./assets/github-logo.png" alt="">
            </div><br>

            <p class="font-semibold text-2xl text-center gray-800 mt-1">GitHub Issues Tracker</p>
            <p class="font-normal text-base text-center text-slate-500 mt-1">Sign in to manage your issues</p>

            <div class="form mt-6">
                <form action="./issues.html" class="mt-6">

                    <label class="" for="username">Username :</label>
                    <input type="text" id="username" name="username" placeholder="Enter Username"
                        class="border border-gray-200 rounded-lg p-4 w-full mt-2">
                    <p class="mb-4 mt-1.5 font-normal text-sm text-[#4a00ff]">Default: admin</p>

                    <label for="password">Password :</label>
                    <input type="password" id="password" name="password" placeholder="Enter Password"
                        class="border border-gray-200 rounded-lg p-4 w-full mt-2">
                    <p class="mb-6 mt-1.5 font-normal text-sm text-[#4a00ff]">Default: admin123</p>

                    <button class="w-full rounded-lg p-4 bg-[#4a00ff] text-white font-semibold text-base text-center btn"
                        type="submit">Sign In</button>
                </form>
            </div>

            <div class="flex items-center my-6">
                <hr class="flex-grow border-gray-300">
                <span class="px-2 text-gray-500 text-sm">OR</span>
                <hr class="flex-grow border-gray-300">
            </div>

            <p class="font-medium mb-1 text-center text-sm text-slate-500">Demo Credentials:</p>
            <div class="bg-gray-50 border border-gray-200 rounded-md p-4 text-sm text-gray-700">
                <p class="font-semibold text-base text-center">Username: <span class="font-normal text-base text-center">admin</span></p>
                <p class="font-semibold text-base text-center">Password: <span class="font-normal text-base text-center">admin123</span></p>
            </div>

        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
